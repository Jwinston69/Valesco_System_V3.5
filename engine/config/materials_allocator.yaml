# Valesco Material Category & Code Allocator
# VERSION: 1.1
# Updated: 2025-11-14 (Aligned to Image 864769 hierarchy)

meta:
  schema_version: "1.1"
  date: "2025-11-14"
  author: "Valesco Dev"
  notes: "Defines MAT.XX.YY hierarchy and numeric code generation rules."

# ---------------------------------------------------------------------------
# CODE GENERATION RULES
# ---------------------------------------------------------------------------
# Pattern: MAT.<TYPE>.<CAT>.<GRP>.<SEQ>
# Example: MAT.STD.04.01.001

allocator:
  prefix:
    standard: "MAT.STD"
    bespoke:  "MAT.BES"
  
  sequence:
    width: 3
  
  format:
    pattern: "{prefix}.{category}.{group}.{seq}"
    components:
      prefix: "MAT.STD"
      category: category_id  # e.g. "04"
      group: group_id        # e.g. "01"
      seq: sequence_number   # e.g. "001"

# ---------------------------------------------------------------------------
# CATEGORY DEFINITIONS
# ---------------------------------------------------------------------------

categories:

  MAT.01:
    label: "Delivery & Charges"
    code_suffix: "01"
    groups:
      "01": { label: "Delivery & Charges - All" }

  MAT.02:
    label: "Fencing"
    code_suffix: "02"
    groups:
      "01": { label: "Fencing & Barriers" }
      "02": { label: "Fencing - All" }
      "03": { label: "Miscellaneous / unclassified fencing" }

  MAT.04:
    label: "Hard Landscaping"
    code_suffix: "04"
    groups:
      "01": { label: "Building Aggregates" }
      "02": { label: "Building Material" }
      "03": { label: "Decorative aggregates" }
      "04": { label: "Miscellaneous / unclassified hard landscaping" }
      "05": { label: "Street furniture - hard landscaping" }

  MAT.05:
    label: "Miscellaneous"
    code_suffix: "05"
    groups:
      "01": { label: "General" }

  MAT.06:
    label: "Soft Landscaping"
    code_suffix: "06"
    groups:
      "01": { label: "Chemicals" }
      "02": { label: "Grass & wildflower seed" }
      "03": { label: "Ground Protection" }
      "04": { label: "Habitat Creation" }
      "05": { label: "Mulch / bark" }
      "06": { label: "Planters" }
      "07": { label: "Planting Sundries" }
      "08": { label: "Turf" }

  MAT.07:
    label: "Soil & ameliorants"
    code_suffix: "07"
    groups:
      "01": { label: "Ameliorants" }
      "02": { label: "Soil" }

  MAT.08:
    label: "Timber"
    code_suffix: "08"
    groups:
      "01": { label: "Timber planting sundries" }
      "02": { label: "Timber landscaping products" }

  MAT.09:
    label: "Nursery"
    code_suffix: "09"
    groups:
      "01": { label: "Nursery Supply" }